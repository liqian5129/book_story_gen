<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>书背后的故事</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <header>
    <div class="logo">书背后的故事</div>
    <div class="header-actions">
      <button id="btn-import-douban" class="btn-sm">导入豆瓣Top250</button>
      <button id="btn-import-awards" class="btn-sm">导入获奖书单</button>
      <button id="btn-import-trending" class="btn-sm">导入热门书</button>
      <button id="btn-setup-remotion" class="btn-sm">⚙ 初始化视频项目</button>
      <button id="btn-show-add" class="btn-sm btn-primary">+ 手动添加书</button>
    </div>
  </header>

  <!-- 手动添加书（折叠） -->
  <div id="add-book-panel" class="add-panel hidden">
    <input id="add-title" type="text" placeholder="书名" />
    <input id="add-author" type="text" placeholder="作者" />
    <button id="btn-add-book" class="btn-primary">添加</button>
    <button id="btn-cancel-add">取消</button>
  </div>

  <!-- 今日任务面板 -->
  <div id="today-panel" class="today-panel">
    <div id="today-content">
      <span class="today-loading">加载中…</span>
    </div>
  </div>

  <div id="main">

    <!-- 左栏：书库 -->
    <div id="book-panel">
      <div class="panel-title">书库 <span id="book-count" class="badge"></span></div>
      <div id="book-list"></div>
    </div>

    <!-- 右栏：故事流水线 -->
    <div id="story-panel">
      <div class="panel-title">
        故事流水线
        <select id="story-filter" style="font-size:12px;padding:3px 8px;margin-left:8px">
          <option value="">全部</option>
          <option value="pending_research">待研究</option>
          <option value="research_done">待生成脚本</option>
          <option value="script_draft">待审核</option>
          <option value="script_approved">待制作</option>
          <option value="producing">制作中</option>
          <option value="done">已完成</option>
          <option value="published">已发布</option>
        </select>
        <button id="btn-refresh-stories" class="btn-sm" style="margin-left:4px">刷新</button>
      </div>
      <div id="story-list"></div>
    </div>

  </div>
</div>

<!-- 角度选择弹窗 -->
<div id="angle-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="angle-modal-title">选择故事角度</h3>
      <button class="close-btn" onclick="closeAngleModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="angle-list" class="angle-list"></div>
    </div>
  </div>
</div>

<!-- 脚本编辑弹窗 -->
<div id="script-modal" class="modal hidden">
  <div class="modal-box" style="width:700px;max-width:95vw">
    <div class="modal-header">
      <h3 id="script-modal-title">审核脚本</h3>
      <button class="close-btn" onclick="closeScriptModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="script-research-summary" class="research-summary-box"></div>
      <label>脚本内容
        <span id="script-word-count" style="font-size:11px;margin-left:8px"></span>
      </label>
      <textarea id="script-editor" rows="16" style="font-size:14px;line-height:1.7"></textarea>
    </div>
    <div class="modal-footer">
      <button id="btn-regen-script" class="btn-sm">重新生成</button>
      <button id="btn-approve-script" class="btn-primary">审核通过 →</button>
    </div>
  </div>
</div>

<!-- 视频预览弹窗 -->
<div id="video-modal" class="modal hidden">
  <div class="modal-box" style="width:420px;max-width:95vw;background:#000;padding:0;border-radius:12px;overflow:hidden">
    <div style="display:flex;justify-content:flex-end;padding:8px">
      <button class="close-btn" onclick="closeVideoModal()" style="color:#fff">✕</button>
    </div>
    <video id="video-player" controls playsinline autoplay
      style="width:100%;display:block;max-height:80vh;background:#000"></video>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
